name: Update Orb Engagement

on:
  schedule:
    - cron: '15 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate required secrets
        env:
          AMPLITUDE_DASHBOARD_API_KEY: ${{ secrets.AMPLITUDE_DASHBOARD_API_KEY }}
          AMPLITUDE_DASHBOARD_SECRET_KEY: ${{ secrets.AMPLITUDE_DASHBOARD_SECRET_KEY }}
        run: |
          if [ -z "$AMPLITUDE_DASHBOARD_API_KEY" ] || [ -z "$AMPLITUDE_DASHBOARD_SECRET_KEY" ]; then
            echo "Missing required Amplitude secrets: AMPLITUDE_DASHBOARD_API_KEY and/or AMPLITUDE_DASHBOARD_SECRET_KEY"
            exit 1
          fi

      - name: Build orb engagement snapshot
        env:
          AMPLITUDE_DASHBOARD_API_KEY: ${{ secrets.AMPLITUDE_DASHBOARD_API_KEY }}
          AMPLITUDE_DASHBOARD_SECRET_KEY: ${{ secrets.AMPLITUDE_DASHBOARD_SECRET_KEY }}
          AMPLITUDE_PROJECT_ID: ${{ secrets.AMPLITUDE_PROJECT_ID }}
          AMPLITUDE_REGION: ${{ secrets.AMPLITUDE_REGION }}
          AMPLITUDE_LOOKBACK_DAYS: ${{ secrets.AMPLITUDE_LOOKBACK_DAYS }}
        run: npm run update:orb-engagement

      - name: Commit updated snapshot
        id: commit_snapshot
        run: |
          if git diff --quiet -- public/orb-engagement.json; then
            echo "No orb engagement changes to commit."
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git add public/orb-engagement.json
          git -c user.name='github-actions[bot]' -c user.email='41898282+github-actions[bot]@users.noreply.github.com' commit -m "Update orb engagement snapshot"
          git push
          echo "changed=true" >> "$GITHUB_OUTPUT"
      - name: Trigger deploy workflow
        if: steps.commit_snapshot.outputs.changed == 'true'
        env:
          WORKFLOW_TRIGGER_PAT: ${{ secrets.ORB_WORKFLOW_TRIGGER_PAT }}
        run: |
          if [ -z "$WORKFLOW_TRIGGER_PAT" ]; then
            echo "Missing ORB_WORKFLOW_TRIGGER_PAT"
            exit 1
          fi
          curl -sS -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $WORKFLOW_TRIGGER_PAT" \
            https://api.github.com/repos/${{ github.repository }}/actions/workflows/deploy.yml/dispatches \
            -d '{"ref":"main"}'
